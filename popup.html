<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Better Shorts Popup</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="logo-wrapper">
        <div class="logo-glow"></div>
        <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- YouTube-style play icon with deep purple gradient -->
          <rect x="1" y="4" width="22" height="16" rx="5.5" fill="url(#logo-grad)" />
          <path d="M10 8.5L16 12L10 15.5V8.5Z" fill="#FFFFFF" />
          <defs>
            <linearGradient id="logo-grad" x1="1" y1="4" x2="23" y2="20" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#c77dff" />
              <stop offset="100%" stop-color="#7b2cbf" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="title-container">
        <h1>Better Shorts</h1>
        <p class="subtitle">Scroll Snap Stabilizer</p>
      </div>
    </header>

    <!-- Main Content -->
    <main class="content">
      <!-- Settings Section -->
      <div class="glass-card settings-card">
        <div class="setting-row">
          <div class="setting-info">
            <span class="setting-title">Stabilization</span>
            <span class="setting-desc">Keep active video locked on resize</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="stabilize-toggle" checked>
            <span class="slider"></span>
          </label>
        </div>
        
        <div class="setting-divider"></div>
        
        <div class="setting-row">
          <div class="setting-info">
            <span class="setting-title">Auto Pause / Resume</span>
            <span class="setting-desc">Pause video when switching tabs</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="pause-toggle">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="divider"></div>
      <div class="footer-bottom">
        <span>v1.0.0</span>
        <div class="footer-links">
          <a href="https://boosty.to/mikayel" target="_blank" class="footer-link boosty-link" title="Donate on Boosty">
            <svg class="footer-icon icon-boosty" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.661 14.337 6.801 0h6.362L11.88 4.444l-.038.077-3.378 11.733h3.15c-1.321 3.289-2.35 5.867-3.086 7.733-5.816-.063-7.442-4.228-6.02-9.155M8.554 24l7.67-11.035h-3.25l2.83-7.073c4.852.508 7.137 4.33 5.791 8.952C20.16 19.81 14.344 24 8.68 24h-.127z"/>
            </svg>
          </a>
          <a href="https://github.com/Mikayel0/Better-Shorts" target="_blank" class="footer-link github-link" title="GitHub Repository" aria-label="GitHub Repository">
            <svg class="footer-icon icon-github" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.137 20.162 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
            </svg>
          </a>
        </div>
      </div>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
